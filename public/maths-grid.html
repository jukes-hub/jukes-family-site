<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maths Grid · Jukes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5EFE3; font-family: 'DM Sans', system-ui, sans-serif; color: #2c2010; min-height: 100vh; }

    header {
      background: #1a3d47;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      color: white;
      letter-spacing: 5px;
      padding: 14px 0;
      text-decoration: none;
    }
    .back {
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      text-decoration: none;
      letter-spacing: 0.5px;
    }
    .back:hover { color: white; }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    @media (min-width: 600px) {
      main { padding: 44px 24px; }
      .logo { font-size: 22px; }
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 34px;
      color: #2c2010;
      margin-bottom: 4px;
    }
    .subhead { color: #7a6a55; font-size: 14px; margin-bottom: 28px; }

    .controls { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-primary { background: #1a3d47; color: white; }
    .btn-primary:hover { background: #2d6575; }
    .btn-ghost { background: #e8ddd0; color: #2c2010; }
    .btn-ghost:hover { background: #ddd0be; }
    .btn-outline { background: transparent; color: #c4893a; border: 1px solid #c4893a !important; }

    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #e8ddd0;
      box-shadow: 0 2px 10px rgba(26,61,71,0.07);
      padding: 32px;
    }

    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; }
    th, td { width: 42px; height: 42px; text-align: center; font-size: 14px; }
    thead th { background: #1a3d47; color: white; font-weight: 600; }
    thead th:first-child { border-radius: 4px 0 0 0; font-size: 16px; }
    tbody td:first-child { background: #d4eaef; font-weight: 600; }
    .math-inp {
      width: 38px; height: 38px;
      text-align: center;
      border: 1px solid #d4c9bb;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      outline: none;
    }
    .math-inp:focus { border-color: #1a3d47; box-shadow: 0 0 0 2px rgba(26,61,71,0.15); }
    .math-inp.correct { border-color: #4a9e6b; background: #e8f7ee; color: #2d6e4a; }
    .math-inp.wrong   { border-color: #e05050; background: #fde8e8; color: #b03030; }
    .answer-cell {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #2d7a8a; font-size: 14px;
      margin: auto;
    }
    .na-cell { color: #ccc; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">JUKES</a>
    <a class="back" href="/">← Back to site</a>
  </header>

  <main>
    <h1>Maths Grid</h1>
    <p class="subhead">Practise addition and subtraction facts 1–10</p>

    <div class="card">
      <div class="controls" id="controls"></div>
      <p id="mobile-hint" style="font-size:12px;color:#7a6a55;margin-bottom:14px;display:none;">
        Showing 6 numbers from 1–12. Tap "New Grid" for a different set.
      </p>
      <div class="table-wrap">
        <table id="grid"></table>
      </div>
    </div>
  </main>

  <script>
    let mode = 'addition';
    let showAnswers = false;
    let gridIndex = 0;
    const inputs = {};
    const checked = {};

    const isMobile = () => window.innerWidth < 640;
    const MOBILE_COUNT = 6;
    const ALL_NUMS = Array.from({ length: 12 }, (_, i) => i + 1); // 1–12

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function shuffled(arr, seed) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = hashCode(seed + i) % (i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function calc(r, c) {
      return mode === 'addition' ? r + c : r - c;
    }

    function getNumbers(seedSuffix) {
      const seed = 'jukes-' + mode + '-' + gridIndex + seedSuffix;
      const s = shuffled(ALL_NUMS, seed);
      return isMobile() ? s.slice(0, MOBILE_COUNT) : s;
    }

    function renderControls() {
      const el = document.getElementById('controls');
      el.innerHTML = '';

      ['addition', 'subtraction'].forEach(m => {
        const btn = document.createElement('button');
        btn.textContent = m.charAt(0).toUpperCase() + m.slice(1);
        btn.className = mode === m ? 'btn-primary' : 'btn-ghost';
        btn.onclick = () => { mode = m; reset(); };
        el.appendChild(btn);
      });

      const showBtn = document.createElement('button');
      showBtn.textContent = showAnswers ? 'Hide Answers' : 'Show Answers';
      showBtn.className = 'btn-outline';
      showBtn.onclick = () => { showAnswers = !showAnswers; render(); };
      el.appendChild(showBtn);

      const resetBtn = document.createElement('button');
      resetBtn.textContent = isMobile() ? 'New Grid' : 'Reset';
      resetBtn.className = 'btn-ghost';
      resetBtn.onclick = () => reset();
      el.appendChild(resetBtn);

      // Mobile hint
      const hint = document.getElementById('mobile-hint');
      if (hint) {
        hint.style.display = isMobile() ? 'block' : 'none';
      }
    }

    function reset() {
      Object.keys(inputs).forEach(k => delete inputs[k]);
      Object.keys(checked).forEach(k => delete checked[k]);
      gridIndex++;
      render();
    }

    function renderGrid() {
      const rows = getNumbers('r');
      const cols = getNumbers('c');
      const cellSize = isMobile() ? 44 : 42;

      const table = document.getElementById('grid');
      table.innerHTML = '';
      table.style.width = '100%';

      // Header row
      const thead = document.createElement('thead');
      const hrow = document.createElement('tr');
      const corner = document.createElement('th');
      corner.textContent = mode === 'addition' ? '+' : '−';
      corner.style.width = cellSize + 'px';
      corner.style.height = cellSize + 'px';
      hrow.appendChild(corner);
      cols.forEach(c => {
        const th = document.createElement('th');
        th.textContent = c;
        th.style.width = cellSize + 'px';
        th.style.height = cellSize + 'px';
        hrow.appendChild(th);
      });
      thead.appendChild(hrow);
      table.appendChild(thead);

      // Body
      const tbody = document.createElement('tbody');
      rows.forEach(r => {
        const tr = document.createElement('tr');
        const rowHead = document.createElement('td');
        rowHead.textContent = r;
        rowHead.style.width = cellSize + 'px';
        rowHead.style.height = cellSize + 'px';
        tr.appendChild(rowHead);

        cols.forEach(c => {
          const td = document.createElement('td');
          td.style.width = cellSize + 'px';
          td.style.height = cellSize + 'px';
          td.style.padding = '2px';
          const answer = calc(r, c);
          const key = `${r}-${c}`;

          if (mode === 'subtraction' && answer < 0) {
            td.className = 'na-cell';
            td.textContent = '—';
          } else if (showAnswers) {
            const div = document.createElement('div');
            div.className = 'answer-cell';
            div.textContent = answer;
            td.appendChild(div);
          } else {
            const inp = document.createElement('input');
            inp.type = 'number';
            inp.inputMode = 'numeric';
            inp.setAttribute('pattern', '[0-9]*');
            inp.className = 'math-inp' + (checked[key] ? ' ' + checked[key] : '');
            inp.value = inputs[key] || '';
            inp.style.display = 'block';
            inp.style.margin = '0 auto';
            inp.style.width = (cellSize - 6) + 'px';
            inp.style.height = (cellSize - 6) + 'px';
            inp.addEventListener('input', e => {
              const val = e.target.value;
              inputs[key] = val;
              if (val === '') {
                delete checked[key];
                inp.className = 'math-inp';
                return;
              }
              if (parseInt(val) === answer) {
                checked[key] = 'correct';
                inp.className = 'math-inp correct';
              } else {
                checked[key] = 'wrong';
                inp.className = 'math-inp wrong';
              }
            });
            td.appendChild(inp);
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    }

    function render() {
      renderControls();
      renderGrid();
    }

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
